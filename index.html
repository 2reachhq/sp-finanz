            {privTab==='wied' && (
              <>
                <div style={{fontSize:12,color:C.mut,marginBottom:12,lineHeight:1.5}}>Wiederkehrende Posten gelten für alle Monate. Vertrag/Beleg im ⋮-Menü anhängen, Zeitraum optional.</div>
                <div style={{display:'flex',flexDirection:isMobile?'column':'row',gap:12}}>
                  <div style={{...SC,flex:1,minWidth:isMobile?'auto':260}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.grn,marginBottom:10}}>Wiederkehrende Einnahmen</div>
                    {renderItems(
                      (md.privat?.einnahmen||[]).filter(i=>i.recurring),
                      (id,fld,val)=>updSec('privat','einnahmen',id,fld,val),
                      id=>delSec('privat','einnahmen',id),
                      ()=>{},
                      ['Privat','Einnahmen'],
                      undefined, undefined,
                      (it,range)=>setSecRange('privat','einnahmen',it,range),
                      null, true
                    )}
                    <AddForm onAdd={(n,a)=>addSec('privat','einnahmen',n,a,true)} />
                  </div>
                  <div style={{...SC,flex:1,minWidth:isMobile?'auto':260}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#FFB37A',marginBottom:10}}>Wiederkehrende Ausgaben</div>
                    {renderItems(
                      (md.privat?.items||[]).filter(i=>i.recurring),
                      (id,fld,val)=>updSec('privat','items',id,fld,val),
                      id=>delSec('privat','items',id),
                      ()=>{},
                      ['Privat'],
                      undefined, undefined,
                      (it,range)=>setSecRange('privat','items',it,range),
                      null, true
                    )}
                    <AddForm onAdd={(n,a)=>addSec('privat','items',n,a,true)} />
                  </div>
                </div>
              </>
            )}
          </>}

          {/* ══ IMPORT (Bankauszug) ══ */}
          {tab==='import' && (()=>{
            const ein = drafts.filter(d=>d.kind==='ein');
            const aus = drafts.filter(d=>d.kind==='aus');
            const allIds = drafts.map(d=>d.id);
            const allSel = allIds.length>0 && draftSel.length===allIds.length;
            const draftRow = d => (
              <div key={d.id} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 0',borderBottom:'1px solid '+C.sep}}>
                <button onClick={()=>setDraftSel(s=>s.includes(d.id)?s.filter(x=>x!==d.id):[...s,d.id])} style={{width:22,height:22,flexShrink:0,borderRadius:6,border:'1.5px solid '+(draftSel.includes(d.id)?C.pri:C.bdrM),background:draftSel.includes(d.id)?C.pri:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',padding:0}}>{draftSel.includes(d.id)&&<Ic p={P.check} sz={13} col={C.priTxt}/>}</button>
                <div style={{flex:1,minWidth:0}}>
                  <input value={d.name} onChange={e=>updateDraft(d.id,{name:e.target.value})} style={{...SI,width:'100%',textAlign:'left',fontSize:14}} />
                  {d.info && <div style={{fontSize:11,color:C.mut,marginTop:2,paddingLeft:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.info}</div>}
                </div>
                <input value={d.amount} onChange={e=>updateDraft(d.id,{amount:e.target.value})} inputMode="decimal" style={{...SI,width:74,...NUM}} />
                <span style={{fontSize:12,color:C.mut,width:10,flexShrink:0}}>€</span>
                <button onClick={()=>updateDraft(d.id,{kind:d.kind==='ein'?'aus':'ein'})} title="Einnahme/Ausgabe wechseln" style={{width:24,height:24,border:'none',borderRadius:6,cursor:'pointer',flexShrink:0,padding:0,background:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}><Ic p={P.swap} sz={14} col={C.sub}/></button>
                <button onClick={()=>delDraft(d.id)} title="Entwurf entfernen" style={{background:'none',border:'none',color:C.mut,cursor:'pointer',flexShrink:0,fontSize:17,lineHeight:1}}>×</button>
              </div>
            );
            const col = (title,list,colr) => (
              <div style={{...SC,flex:1,minWidth:isMobile?'auto':280}}>
                <div style={{fontSize:12,fontWeight:600,color:colr,marginBottom:6,display:'flex',justifyContent:'space-between'}}><span>{title}</span><span style={{color:C.mut}}>{list.length}</span></div>
                {list.length? list.map(draftRow) : <div style={{fontSize:13,color:C.mut,padding:'10px 0'}}>Noch nichts.</div>}
              </div>
            );
            return (
              <>
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:30,fontWeight:800,letterSpacing:'-0.03em',marginBottom:3}}>Beleg- & Bankauszug-Import</div>
                  <div style={{fontSize:13,color:C.sub}}>PDF oder Foto hochladen → KI liest die Posten aus → einzeln/mehrere dem richtigen Konto zuordnen</div>
                </div>

                <div style={{display:'flex',flexDirection:isMobile?'column':'row',gap:12,marginBottom:16}}>
                  <div style={{...SC,flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.pri,marginBottom:8,letterSpacing:'0.04em'}}>VARIANTE A · MIT KI</div>
                    <label style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'20px',border:'1.5px dashed '+C.pri,borderRadius:14,cursor:importBusy?'default':'pointer',textAlign:'center',opacity:importBusy?0.6:1}}>
                      <Ic p={P.spark} sz={24} col={C.pri}/>
                      <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{importBusy?'KI liest aus…':'PDF/Foto auswählen'}</div>
                      <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>Claude liest Beschreibung, Betrag, Datum & Rechnungsnummer – auch aus Fotos/Scans.</div>
                      <input type="file" accept=".pdf,application/pdf,image/*" multiple disabled={importBusy} onChange={async e=>{const fs=[...e.target.files]; e.target.value=''; for(const f of fs){ await importPdf(f); }}} style={{display:'none'}} />
                    </label>
                  </div>
                  <div style={{...SC,flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:8,letterSpacing:'0.04em'}}>VARIANTE B · OHNE KI (TEST)</div>
                    <label style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'20px',border:'1.5px dashed '+C.surf3,borderRadius:14,cursor:importBusy?'default':'pointer',textAlign:'center',opacity:importBusy?0.6:1}}>
                      <Ic p={P.upload} sz={24} col={C.sub}/>
                      <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{importBusy?'Wird gelesen…':'PDF/Foto auswählen'}</div>
                      <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>Lokal, ohne KI: Text-PDF direkt, Fotos per OCR (langsamer, ungenauer). Nur zum Vergleichen.</div>
                      <input type="file" accept=".pdf,application/pdf,image/*" multiple disabled={importBusy} onChange={async e=>{const fs=[...e.target.files]; e.target.value=''; for(const f of fs){ await importLocal(f); }}} style={{display:'none'}} />
                    </label>
                  </div>
                </div>

                {drafts.length>0 && (
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:10}}>
                    <span style={{fontSize:13,color:C.sub,marginRight:'auto'}}>{draftSel.length} von {drafts.length} ausgewählt</span>
                    <button onClick={()=>setDraftSel(allSel?[]:allIds)} style={toolBtn}>{allSel?'Keine':'Alle'}</button>
                    <button disabled={!draftSel.length} onClick={()=>setAssignOpen(true)} style={{...toolBtn,color:C.pri,opacity:draftSel.length?1:0.4}}>Zuordnen</button>
                    <button onClick={()=>askConfirm('Alle Entwürfe verwerfen?',()=>{setDrafts(()=>[]);setDraftSel([]);})} style={{...toolBtn,color:C.red}}>Alle verwerfen</button>
                  </div>
                )}

                {drafts.length>0 ? (
                  <div style={{display:'flex',flexDirection:isMobile?'column':'row',gap:12}}>
                    {col('Einnahmen', ein, C.grn)}
                    {col('Ausgaben', aus, '#FFB37A')}
                  </div>
                ) : (
                  <div style={{...SC,textAlign:'center',color:C.mut,fontSize:14,padding:'30px 24px'}}>Noch keine Entwürfe. Lade oben einen Bankauszug als PDF hoch.</div>
                )}
              </>
            );
          })()}

          {/* ══ KI-BERATER ══ */}
          {tab==='berater' && (
            <>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:30,fontWeight:800,letterSpacing:'-0.03em',marginBottom:3,display:'flex',alignItems:'center',gap:8}}><Ic p={P.spark} sz={24} col={C.pri}/> KI-Berater</div>
                <div style={{fontSize:13,color:C.sub}}>Fragt deine Zahlen (Jahr {yr}) – gibt Hinweise & Spar-Tipps. Kein Ersatz für einen Steuerberater.</div>
              </div>

              {advisorNotes.length>0 && (
                <div style={{...SC,marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:8,display:'flex',alignItems:'center',gap:6}}><Ic p={P.pin} sz={13} col={C.amb}/> Gespeicherte Notizen</div>
                  {advisorNotes.map(n=>(
                    <div key={n.id} style={{display:'flex',gap:8,alignItems:'flex-start',padding:'8px 0',borderBottom:'1px solid '+C.sep}}>
                      <div style={{flex:1,fontSize:13,color:C.txt,whiteSpace:'pre-wrap',lineHeight:1.5}}>{n.text}</div>
                      <button onClick={()=>delNote(n.id)} title="Notiz löschen" style={{background:'none',border:'none',color:C.mut,cursor:'pointer',fontSize:16,lineHeight:1,flexShrink:0}}>×</button>
                    </div>
                  ))}
                </div>
              )}

              <div style={{...SC,minHeight:isMobile?'58vh':440,marginBottom:12}}>
                {chat.length===0 ? (
                  <div>
                    <div style={{fontSize:13,color:C.mut,marginBottom:12,lineHeight:1.5}}>Stell eine Frage zu deinen Finanzen – z.B.:</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                      {['Analysiere mein Jahr '+yr,'Wo kann ich sparen?','Was könnte absetzbar sein?','Welcher Monat war am besten/schlechtesten?'].map(q=>(
                        <button key={q} onClick={()=>aiSend(q)} disabled={aiBusy} style={{background:C.surf2,border:'1px solid '+C.bdr,color:C.txt,borderRadius:10,padding:'9px 13px',fontSize:13,cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>{q}</button>
                      ))}
                    </div>
                  </div>
                ) : (
                  <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    {chat.map((m,i)=>(
                      <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                        <div style={{maxWidth:'88%'}}>
                          <div style={{
                            background:m.role==='user'?C.act:C.surf2, color:m.role==='user'?C.actTxt:C.txt,
                            borderRadius:14, padding:'10px 13px', fontSize:14, lineHeight:1.55, whiteSpace:'pre-wrap',
                          }}>{m.role==='assistant'?cleanMd(m.content):m.content}</div>
                          {m.role==='assistant' && (
                            <button onClick={()=>{addNote(cleanMd(m.content)); setToast('Als Notiz gespeichert');}} style={{marginTop:5,background:'none',border:'none',color:C.sub,cursor:'pointer',fontSize:12,fontFamily:'inherit',display:'flex',alignItems:'center',gap:5,padding:0}}><Ic p={P.pin} sz={12} col={C.sub}/> Als Notiz speichern</button>
                          )}
                        </div>
                      </div>
                    ))}
                    {aiBusy && <div style={{fontSize:13,color:C.mut,fontStyle:'italic'}}>Denkt nach…</div>}
                  </div>
                )}
              </div>

              <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)} placeholder="Frage eingeben…" rows={1}
                  onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); aiSend(); } }}
                  style={{flex:1,background:C.surf2,border:'1px solid '+C.bdr,borderRadius:12,color:C.txt,padding:'11px 14px',fontSize:14,outline:'none',fontFamily:'inherit',resize:'none',lineHeight:1.4,minHeight:44}} />
                <button onClick={()=>aiSend()} disabled={aiBusy||!chatInput.trim()} title="Senden" style={{background:C.act,color:C.actTxt,border:'none',borderRadius:12,width:46,height:46,flexShrink:0,cursor:aiBusy||!chatInput.trim()?'default':'pointer',opacity:aiBusy||!chatInput.trim()?0.5:1,display:'flex',alignItems:'center',justifyContent:'center'}}><Ic p={P.send} sz={18} col={C.actTxt}/></button>
              </div>
              {chat.length>0 && <button onClick={()=>setChat([])} style={{marginTop:10,background:'none',border:'none',color:C.mut,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Gespräch zurücksetzen</button>}
            </>
          )}

          {/* ══ RECHNUNGEN ══ */}
          {tab==='rechnung' && (()=>{
            const fld={...SS,textAlign:'left'};
            const primBtn={display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:C.act,color:C.actTxt,border:'none',borderRadius:12,padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'};
            const tot = invEdit ? invTotals(invEdit.items) : null;

            if(custEdit){
              return (
                <>
                  <button onClick={()=>setCustEdit(null)} style={{background:'none',border:'none',color:C.sub,cursor:'pointer',fontFamily:'inherit',fontSize:13,padding:0,marginBottom:10}}>‹ Rechnungen</button>
                  <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:16}}>{customers.some(c=>c.id===custEdit.id)?'Kunde bearbeiten':'Neuer Kunde'}</div>
                  <div style={{...SC,display:'flex',flexDirection:'column',gap:10}}>
                    <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Name / Firma</div><input value={custEdit.name||''} onChange={e=>setCustEdit({...custEdit,name:e.target.value})} style={fld}/></div>
                    <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Adresse</div><textarea value={custEdit.address||''} onChange={e=>setCustEdit({...custEdit,address:e.target.value})} rows={3} style={{...fld,resize:'vertical'}}/></div>
                    <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>E-Mail</div><input value={custEdit.email||''} onChange={e=>setCustEdit({...custEdit,email:e.target.value})} style={fld}/></div>
                    <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Kundennr. (optional)</div><input value={custEdit.custNo||''} onChange={e=>setCustEdit({...custEdit,custNo:e.target.value})} style={fld}/></div>
                    <button onClick={()=>{ saveCustomer(custEdit); setCustEdit(null); setToast('Kunde gespeichert'); }} style={primBtn}>Speichern</button>
                  </div>
                </>
              );
            }

            if(invEdit){
              const setI=patch=>setInvEdit({...invEdit,...patch});
              const setItem=(i,patch)=>setInvEdit({...invEdit, items:invEdit.items.map((it,ix)=>ix===i?{...it,...patch}:it)});
              return (
                <>
                  <button onClick={()=>setInvEdit(null)} style={{background:'none',border:'none',color:C.sub,cursor:'pointer',fontFamily:'inherit',fontSize:13,padding:0,marginBottom:10}}>‹ Rechnungen</button>
                  <div style={{fontSize:28,fontWeight:800,letterSpacing:'-0.03em',marginBottom:16}}>Rechnung {invEdit.number}</div>
                  {customers.length===0 ? (
                    <div style={{...SC,fontSize:14,color:C.sub}}>Lege zuerst einen Kunden an.<br/><button onClick={()=>setCustEdit({id:uid(),name:'',address:'',email:'',custNo:''})} style={{...primBtn,marginTop:12}}>+ Kunde anlegen</button></div>
                  ) : (
                    <>
                      <div style={{...SC,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
                        <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Kunde</div>
                          <select value={invEdit.customerId} onChange={e=>setI({customerId:e.target.value})} style={SS}>{customers.map(c=><option key={c.id} value={c.id}>{c.name||'(ohne Name)'}</option>)}</select>
                        </div>
                        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                          <div style={{flex:1,minWidth:120}}><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Rechnungsnr.</div><input value={invEdit.number} onChange={e=>setI({number:e.target.value})} style={fld}/></div>
                          <div style={{flex:1,minWidth:120}}><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Datum</div><input type="date" value={invEdit.date} onChange={e=>setI({date:e.target.value})} style={{...fld,colorScheme:'dark'}}/></div>
                          <div style={{flex:1,minWidth:120}}><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Fällig</div><input type="date" value={invEdit.due} onChange={e=>setI({due:e.target.value})} style={{...fld,colorScheme:'dark'}}/></div>
                        </div>
                      </div>
                      <div style={{...SC,marginBottom:12,border:'1px solid '+KONTO_COLORS.unter.bd,background:KONTO_COLORS.unter.tint}}>
                        <div style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:7,marginBottom:8}}><Ic p={P.spark} sz={15} col={KONTO_COLORS.unter.c}/> KI-Assistent</div>
                        <div style={{fontSize:12,color:C.mut,marginBottom:8,lineHeight:1.5}}>Kurz beschreiben, was du in Rechnung stellst – die KI erstellt die Positionen.</div>
                        <textarea value={invAiText} onChange={e=>setInvAiText(e.target.value)} rows={2} placeholder="z. B. Webdesign 1.500 €, Wartung 200 €/Monat" style={{...fld,resize:'vertical',marginBottom:8}}/>
                        <button onClick={aiInvoice} disabled={invAiBusy} style={{...primBtn,background:KONTO_COLORS.unter.c,color:'#0A0A0A',opacity:invAiBusy?0.6:1}}>{invAiBusy?'Erstellt…':'Positionen erstellen'}</button>
                      </div>
                      <div style={{...SC,marginBottom:12}}>
                        <div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:10}}>Positionen</div>
                        {invEdit.items.map((it,i)=>(
                          <div key={i} style={{borderBottom:'1px solid '+C.sep,paddingBottom:10,marginBottom:10}}>
                            <input value={it.desc} onChange={e=>setItem(i,{desc:e.target.value})} placeholder="Beschreibung" style={{...fld,marginBottom:8}}/>
                            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                              <div style={{width:60}}><div style={{fontSize:10,color:C.mut,marginBottom:4}}>Menge</div><input value={it.qty} onChange={e=>setItem(i,{qty:e.target.value})} inputMode="decimal" style={{...fld,...NUM}}/></div>
                              <div style={{flex:1}}><div style={{fontSize:10,color:C.mut,marginBottom:4}}>Einzelpreis €</div><input value={it.price} onChange={e=>setItem(i,{price:e.target.value})} inputMode="decimal" style={{...fld,...NUM}}/></div>
                              <div style={{width:78}}><div style={{fontSize:10,color:C.mut,marginBottom:4}}>MwSt</div><select value={String(it.mwst!=null?it.mwst:19)} onChange={e=>setItem(i,{mwst:e.target.value})} style={SS}><option value="19">19%</option><option value="7">7%</option><option value="0">0%</option></select></div>
                              <button onClick={()=>setI({items:invEdit.items.filter((_,ix)=>ix!==i)})} style={{background:'none',border:'none',color:C.mut,cursor:'pointer',fontSize:18,padding:'0 4px'}}>×</button>
                            </div>
                          </div>
                        ))}
                        <button onClick={()=>setI({items:[...invEdit.items,{desc:'',qty:1,price:0,mwst:19}]})} style={{background:'none',border:'1px dashed '+C.surf3,color:C.mut,borderRadius:8,padding:'7px 14px',fontSize:13,cursor:'pointer',fontFamily:'inherit',width:'100%'}}>+ Position</button>
                        <div style={{marginTop:14,textAlign:'right'}}>
                          <div style={{fontSize:12,color:C.sub}}>Netto: {fmt(tot.net)}</div>
                          <div style={{fontSize:12,color:C.sub}}>MwSt: {fmt(tot.tax)}</div>
                          <div style={{fontSize:20,fontWeight:800,...NUM,marginTop:4}}>Gesamt: {fmt(tot.gross)}</div>
                        </div>
                      </div>
                      <div><div style={{fontSize:12,color:C.sub,marginBottom:5}}>Notiz (optional, erscheint auf der Rechnung)</div><textarea value={invEdit.note||''} onChange={e=>setI({note:e.target.value})} rows={2} style={{...fld,resize:'vertical',marginBottom:12}}/></div>
                      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                        <button onClick={saveInvoice} style={{...primBtn,flex:2,minWidth:200}}>Speichern + als Einnahme buchen</button>
                        <button onClick={()=>printInvoice(invEdit)} style={{...primBtn,background:C.surf2,color:C.txt,flex:1,minWidth:130}}>Als PDF</button>
                      </div>
                    </>
                  )}
                </>
              );
            }

            return (
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:10}}>
                  <div><div style={{fontSize:30,fontWeight:800,letterSpacing:'-0.03em',marginBottom:3}}>Rechnungen</div><div style={{fontSize:13,color:C.sub}}>Kunden anlegen, Rechnungen erstellen</div></div>
                  <button onClick={()=>setInvEdit(newInvoice())} style={{...primBtn,width:'auto',padding:'10px 16px'}}>+ Neue Rechnung</button>
                </div>
                {!company.name && <div style={{...SC,marginBottom:12,fontSize:13,color:C.amb,background:C.ambL,border:'1px solid rgba(255,180,0,0.25)',lineHeight:1.5}}>Tipp: Hinterlege unter <b>Einstellungen</b> deine Firmendaten + Logo für den Rechnungskopf.</div>}
                <div style={{...SC,marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.sub,marginBottom:8}}>Deine Rechnungen</div>
                  {invoices.length? [...invoices].reverse().map(inv=>{ const c=customers.find(x=>x.id===inv.customerId); return (
                    <div key={inv.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid '+C.sep}}>
                      <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600}}>{inv.number}</div><div style={{fontSize:12,color:C.sub}}>{(c&&c.name)||'—'} · {inv.date}</div></div>
                      <div style={{fontSize:15,fontWeight:700,...NUM,color:C.grn}}>{fmt(inv.total||invTotals(inv.items).gross)}</div>
                      <button onClick={()=>printInvoice(inv)} title="Als PDF" style={{background:C.surf2,border:'none',color:C.txt,borderRadius:8,padding:'7px 10px',cursor:'pointer',fontFamily:'inherit',fontSize:12}}>PDF</button>
                      <button onClick={()=>setInvEdit(inv)} title="Öffnen" style={{background:'none',border:'none',color:C.sub,cursor:'pointer',fontSize:16}}>›</button>
                    </div>
                  ); }) : <div style={{fontSize:13,color:C.mut}}>Noch keine Rechnungen.</div>}
                </div>
                <div style={SC}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.sub}}>Kunden</div>

              </button>
            </div>
            {cell('berater','Berater',P.spark,['berater'])}
            {cell('mehr','Sonstiges',P.menu,['mehr','kal','yr','steuer'])}
          </div>
        );
      })()}

      {/* ═══ BELEG ERFASSEN ═══ */}
      {belegOpen && (
        <Sheet title="Beleg erfassen" onClose={()=>{ if(!belegBusy){ setBelegOpen(false); setBelegRes(null); belegBlobRef.current=null; } }}>
          {!belegRes ? (
            <>
              <div style={{fontSize:13,color:C.mut,marginBottom:14,lineHeight:1.5}}>Foto vom Beleg machen oder Datei wählen – die KI liest Betrag, Datum & Rechnungsnummer aus. Das Bild wird verkleinert und beim Speichern zum Monat abgelegt.</div>
              <label style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:C.act,color:C.actTxt,borderRadius:12,padding:'14px',fontSize:15,fontWeight:700,cursor:belegBusy?'default':'pointer',marginBottom:10,opacity:belegBusy?0.6:1}}>
                <Ic p={P.camera} sz={18} col={C.actTxt}/> {belegBusy?'Liest aus…':'Foto aufnehmen'}
                <input type="file" accept="image/*" capture="environment" disabled={belegBusy} onChange={e=>{const f=e.target.files[0]; e.target.value=''; if(f)extractBeleg(f);}} style={{display:'none'}} />
              </label>
              <label style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:C.surf2,color:C.txt,borderRadius:12,padding:'14px',fontSize:15,fontWeight:600,cursor:belegBusy?'default':'pointer',opacity:belegBusy?0.6:1}}>
                <Ic p={P.upload} sz={18} col={C.txt}/> Datei / Foto wählen
                <input type="file" accept="image/*,.pdf,application/pdf" disabled={belegBusy} onChange={e=>{const f=e.target.files[0]; e.target.value=''; if(f)extractBeleg(f);}} style={{display:'none'}} />
              </label>
            </>
          ) : (
            <>
              {belegRes.unsicher && (
                <div style={{background:C.ambL,border:'1px solid rgba(255,180,0,0.4)',borderRadius:10,padding:'10px 12px',marginBottom:12,fontSize:12,color:C.amb,lineHeight:1.5}}>⚠ Bild war evtl. unscharf/unvollständig – bitte Beträge kurz prüfen.</div>
              )}
              <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Bezeichnung</div>
              <input value={belegRes.name} onChange={e=>setBelegRes(r=>({...r,name:e.target.value}))} style={{...SS,marginBottom:10,textAlign:'left'}} />
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Brutto (€)</div>
                  <input value={belegRes.amount} onChange={e=>setBelegRes(r=>({...r,amount:e.target.value}))} inputMode="decimal" style={{...SS,textAlign:'left',...NUM}} />
                </div>
                <div style={{width:140}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Art</div>
                  <button onClick={()=>setBelegRes(r=>({...r,kind:r.kind==='ein'?'aus':'ein'}))} style={{...SS,cursor:'pointer',textAlign:'left',color:belegRes.kind==='ein'?C.grn:C.txt,fontWeight:600}}>{belegRes.kind==='ein'?'Einnahme':'Ausgabe'}</button>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Netto (€)</div>
                  <input value={belegRes.netto} onChange={e=>setBelegRes(r=>({...r,netto:e.target.value}))} inputMode="decimal" style={{...SS,textAlign:'left',...NUM}} />
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>MwSt (%)</div>
                  <input value={belegRes.mwst} onChange={e=>setBelegRes(r=>({...r,mwst:e.target.value}))} inputMode="decimal" style={{...SS,textAlign:'left',...NUM}} />
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Belegnummer</div>
                  <input value={belegRes.belegnr} onChange={e=>setBelegRes(r=>({...r,belegnr:e.target.value}))} style={{...SS,textAlign:'left'}} />
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Datum</div>
                  <input value={belegRes.datum} onChange={e=>setBelegRes(r=>({...r,datum:e.target.value}))} placeholder="TT.MM.JJJJ" style={{...SS,textAlign:'left'}} />
                </div>
              </div>
              <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Konto</div>
              <select value={belegDest} onChange={e=>setBelegDest(e.target.value)} style={{...SS,marginBottom:10}}>{moveTargets.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}</select>
              <div style={{fontSize:12,color:C.sub,marginBottom:6}}>Monat</div>
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                <select value={belegM} onChange={e=>setBelegM(+e.target.value)} style={{...SS,flex:1}}>{MONTHS.map((mn,i)=><option key={i} value={i}>{mn}</option>)}</select>
                <select value={belegY} onChange={e=>setBelegY(+e.target.value)} style={{...SS,width:100}}>{[yr-1,yr,yr+1].map(y=><option key={y} value={y}>{y}</option>)}</select>
              </div>
              <button onClick={saveBeleg} disabled={belegBusy} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:C.act,color:C.actTxt,border:'none',borderRadius:12,padding:'13px',fontSize:15,fontWeight:700,cursor:belegBusy?'default':'pointer',opacity:belegBusy?0.6:1,fontFamily:'inherit'}}>{belegBusy?'Speichert…':'Speichern + Beleg ablegen'}</button>
              <button onClick={()=>{setBelegRes(null); belegBlobRef.current=null;}} disabled={belegBusy} style={{width:'100%',background:'none',border:'none',color:C.mut,fontSize:13,cursor:'pointer',fontFamily:'inherit',marginTop:10}}>Anderen Beleg auslesen</button>
            </>
          )}
        </Sheet>
      )}

      {iconPick && (
        <Sheet title="Icon wählen" onClose={()=>setIconPick(null)}>
          <div style={{display:'flex',flexWrap:'wrap',gap:10}}>
            {[['house',P.house],['bed',P.bed],['brief',P.brief],['prson',P.prson],['grid',P.grid],['cal',P.cal],['doc',P.doc]].map(([key,icon])=>{
              const cur=((names.propIcon&&names.propIcon[iconPick])||'house')===key;
              return (
                <button key={key} onClick={()=>{ setNames(n=>({...n,propIcon:{...(n.propIcon||{}),[iconPick]:key}})); setIconPick(null); }} style={{width:54,height:54,borderRadius:14,border:'2px solid '+(cur?C.pri:C.bdr),background:cur?C.priL:C.surf2,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ic p={icon} sz={22} col={cur?C.pri:C.txt}/>
                </button>
              );
            })}
          </div>
        </Sheet>
      )}

      {bulkMove && (
        <TargetPicker title={bulkMove.ids.length+' Posten verschieben'} moveTargets={moveTargets} curY={yr} curM={mo}
          confirmLabel="Verschieben"
          onClose={()=>setBulkMove(null)}
          onConfirm={(dest,ty,tm)=>{ const loc=locOf(bulkMove.srcKey); const arr=loc?getListAt(md,loc):[]; const items=arr.filter(i=>bulkMove.ids.includes(i.id)); moveItems(bulkMove.srcKey,items,dest,ty,tm); setBulkMove(null); exitSel(); }} />
      )}

      {assignOpen && (
        <TargetPicker title={draftSel.length+' Umsätze zuordnen'} moveTargets={moveTargets} curY={yr} curM={mo}
          confirmLabel="Zuordnen"
          onClose={()=>setAssignOpen(false)}
          onConfirm={(dest,ty,tm)=>{ assignDrafts(draftSel,dest,ty,tm); setAssignOpen(false); }} />
      )}

      {confirmState && (
        <div onClick={()=>setConfirmState(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.surf,border:'1px solid '+C.bdr,borderRadius:18,padding:'22px 24px',maxWidth:380,width:'100%',boxShadow:'0 16px 48px rgba(0,0,0,0.5)'}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{confirmState.title}</div>
            <div style={{fontSize:13,color:C.sub,lineHeight:1.5,marginBottom:22}}>{confirmState.message}</div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button onClick={()=>setConfirmState(null)} style={{background:C.surf2,border:'1px solid '+C.bdr,color:C.txt,borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Abbrechen</button>
              <button onClick={()=>{ const a=confirmState.onConfirm; setConfirmState(null); if(a) a(); }} style={{background:C.red,border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Löschen</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{position:'fixed',bottom:20,right:20,maxWidth:340,zIndex:50,
          background:C.surf2,border:'1px solid '+C.bdrM,color:C.txt,
          padding:'11px 16px',borderRadius:10,fontSize:13,lineHeight:1.4,
          boxShadow:'0 8px 28px rgba(0,0,0,0.45)'}}>{toast}</div>
      )}
    </div>
  );
}

/* ══ Root: Login-Gate ══ */
function Root() {
  const [session,setSession]=useState(undefined);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>{ try{sub.subscription.unsubscribe();}catch(e){} };
  },[]);
  if(session===undefined) return <Splash text="Wird geladen…" />;
  if(!session) return <Login />;
  return <App session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
